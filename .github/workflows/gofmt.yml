name: gofmt

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  gofmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Check gofmt
        run: |
          unformatted=$(gofmt -l internal/ cmd/)
          if [ -n "$unformatted" ]; then
            echo "The following files are not gofmt'd:"
            echo "$unformatted"
            echo ""
            echo "Fix with: gofmt -w internal/ cmd/"
            exit 1
          fi
